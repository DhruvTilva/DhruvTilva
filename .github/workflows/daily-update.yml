name: Daily Feed AI Update

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Fetch AI News
        id: news
        run: |
          RESPONSE=$(curl -s --fail "https://api.spaceflightnewsapi.net/v4/articles/?limit=20" || echo "")

          TITLE="AI news updating..."
          URL="#"

          if [ -n "$RESPONSE" ]; then
            for i in {0..9}; do
              T=$(echo $RESPONSE | jq -r ".results[$i].title // empty")
              U=$(echo $RESPONSE | jq -r ".results[$i].url // empty")

              if echo "$T" | grep -Ei "OpenAI|Gemini|Claude|Anthropic|Meta|DeepSeek|AI|LLM|Machine Learning"; then
                TITLE=$(echo "$T" | cut -c1-90)
                URL=$U
                break
              fi
            done
          fi

          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "url=$URL" >> $GITHUB_OUTPUT


      - name: Generate AI Pulse
        id: ai
        run: |
          EVENTS=("New OpenAI model launched" "Claude improving reasoning" "Gemini expanding capabilities" "LLMs evolving rapidly" "AI adoption growing fast")
          T1=$((RANDOM % ${#EVENTS[@]}))

          echo "line=${EVENTS[$T1]}" >> $GITHUB_OUTPUT


      - name: Fetch Trending Repo
        id: repo
        run: |
          DATA=$(curl -s --fail "https://ghapi.huchen.dev/repositories?since=daily" || echo "[]")

          NAME=$(echo $DATA | jq -r '.[0].name // "AI tools"')
          URL=$(echo $DATA | jq -r '.[0].url // "#"')
          STARS=$(echo $DATA | jq -r '.[0].stars // "0"')

          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "stars=$STARS" >> $GITHUB_OUTPUT


      - name: Update README
        run: |
          sed -i "s|<!--NEWS_TITLE-->.*|${{ steps.news.outputs.title }}|" README.md
          sed -i "s|<!--NEWS_LINK-->.*|${{ steps.news.outputs.url }}|" README.md
          sed -i "s|<!--AI_LINE-->.*|${{ steps.ai.outputs.line }}|" README.md

          sed -i "s|<!--TREND_REPO_NAME-->.*|${{ steps.repo.outputs.name }}|" README.md
          sed -i "s|<!--TREND_REPO_LINK-->.*|${{ steps.repo.outputs.url }}|" README.md
          sed -i "s|<!--TREND_REPO_STARS-->.*|${{ steps.repo.outputs.stars }}|" README.md


      - name: Commit changes
        run: |
          git config --global user.name "DhruvTilva"
          git config --global user.email "tilvadhruv8@gmail.com"
          git add README.md
          git commit -m "update: AI news + pulse + trending repo" || echo "No changes"
          git push
