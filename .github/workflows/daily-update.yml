name: Daily Feed AI Update
on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      # ✅ AI NEWS
      - name: Fetch AI News
        id: news
        run: |
          RESPONSE=$(curl -s "https://api.spaceflightnewsapi.net/v4/articles/?limit=10")
          TITLE=$(echo $RESPONSE | jq -r '.results[0].title // "Latest AI updates available"')
          TITLE=$(echo "$TITLE" | cut -c1-90)
          echo "title=$TITLE" >> $GITHUB_OUTPUT

      # ✅ AI PULSE
      - name: Generate AI Pulse
        id: ai
        run: |
          EVENTS=("New OpenAI model launched" "Claude improving reasoning" "Gemini expanding capabilities" "LLMs evolving rapidly" "AI adoption growing fast")
          INDEX=$((RANDOM % ${#EVENTS[@]}))
          echo "line=${EVENTS[$INDEX]}" >> $GITHUB_OUTPUT

      # ✅ TRENDING REPO (GitHub Trending page - today's stars)
      - name: Install Python deps
        run: pip install requests beautifulsoup4 -q

      - name: Fetch Trending Repo
        id: repo
        run: |
          python3 << 'EOF'
          import requests
          from bs4 import BeautifulSoup
          import os

          url = "https://github.com/trending?since=daily"
          headers = {"User-Agent": "Mozilla/5.0"}

          try:
              res = requests.get(url, headers=headers, timeout=10)
              soup = BeautifulSoup(res.text, "html.parser")
              repo = soup.select("article.Box-row")[0]

              name_tag = repo.select_one("h2 a")
              full_name = name_tag["href"].strip("/")
              repo_name = full_name.split("/")[-1]

              stars_tag = repo.select_one("span.d-inline-block.float-sm-right")
              stars_text = stars_tag.get_text(strip=True) if stars_tag else "N/A"
              stars_text = stars_text.replace("stars today", "").strip()

          except Exception as e:
              print(f"Error: {e}")
              repo_name = "AI Repo"
              stars_text = "N/A"

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"name={repo_name}\n")
              f.write(f"stars={stars_text}\n")
          EOF

      # ✅ UPDATE README
      - name: Update README
        run: |
          sed -i "s|<!--NEWS_TITLE-->[^<]*|<!--NEWS_TITLE-->${{ steps.news.outputs.title }}|g" README.md
          sed -i "s|<!--AI_LINE-->[^<]*|<!--AI_LINE-->${{ steps.ai.outputs.line }}|g" README.md
          sed -i "s|<!--TREND_REPO_NAME-->[^&]*|<!--TREND_REPO_NAME-->${{ steps.repo.outputs.name }} |g" README.md
          sed -i "s|<!--TREND_REPO_STARS-->[^s]*stars today|<!--TREND_REPO_STARS-->${{ steps.repo.outputs.stars }} stars today|g" README.md

      # ✅ COMMIT
      - name: Commit changes
        run: |
          git config --global user.name "DhruvTilva"
          git config --global user.email "tilvadhruv8@gmail.com"
          git add README.md
          git commit -m "update: AI live feed $(date +'%Y-%m-%d')" || echo "No changes"
          git push
