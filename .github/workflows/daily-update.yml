name: Daily AI Update

on:
  schedule:
    - cron: "0 18 * * *"  
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Fetch AI News
        id: news
        run: |
          RESPONSE=$(curl -s --fail "https://api.spaceflightnewsapi.net/v4/articles/?limit=20" || echo "")

          TITLE=""
          URL=""

          if [ -n "$RESPONSE" ]; then
            for i in {0..9}; do
              T=$(echo $RESPONSE | jq -r ".results[$i].title // empty")
              U=$(echo $RESPONSE | jq -r ".results[$i].url // empty")

              if echo "$T" | grep -Ei "OpenAI|Gemini|Claude|Anthropic|Meta|DeepSeek|AI|LLM|Machine Learning"; then
                TITLE=$(echo "$T" | cut -c1-90)
                URL=$U
                break
              fi
            done

            if [ -z "$TITLE" ]; then
              TITLE=$(echo $RESPONSE | jq -r '.results[0].title // "AI news updating..."' | cut -c1-90)
              URL=$(echo $RESPONSE | jq -r '.results[0].url // "#"')
            fi
          else
            TITLE="AI news updating..."
            URL="#"
          fi

          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "url=$URL" >> $GITHUB_OUTPUT


      - name: Generate AI Pulse
        id: ai
        run: |
          TYPE=$((RANDOM % 2))

          if [ $TYPE -eq 0 ]; then
            DATA=$(curl -s --fail "https://ghapi.huchen.dev/repositories?since=daily" || echo "[]")

            NAME=$(echo $DATA | jq -r '.[0].name // empty')
            STARS=$(echo $DATA | jq -r '.[0].stars // empty')

            if [ -n "$NAME" ]; then
              echo "line=$NAME trending • $STARS⭐ today" >> $GITHUB_OUTPUT
            else
              echo "line=AI ecosystem evolving fast • Stay updated" >> $GITHUB_OUTPUT
            fi

          else
            MODEL=$(curl -s --fail "https://huggingface.co/api/models?sort=downloads" | jq -r '.[0].modelId // empty')

            if [ -n "$MODEL" ]; then
              echo "line=HF trending: $MODEL" >> $GITHUB_OUTPUT
            else
              echo "line=New AI models emerging daily" >> $GITHUB_OUTPUT
            fi
          fi


      - name: Fetch Trending Repo
        id: repo
        run: |
          DATA=$(curl -s --fail "https://ghapi.huchen.dev/repositories?since=daily" || echo "[]")

          NAME=$(echo $DATA | jq -r '.[0].name // empty')
          URL=$(echo $DATA | jq -r '.[0].url // empty')
          STARS=$(echo $DATA | jq -r '.[0].stars // empty')

          if [ -n "$NAME" ]; then
            echo "repo=<a href=\"$URL\" target=\"_blank\">$NAME</a> • $STARS⭐" >> $GITHUB_OUTPUT
          else
            echo "repo=AI tools trending today 🚀" >> $GITHUB_OUTPUT
          fi


      - name: Update README
        run: |
          sed -i "s|<!--NEWS_TITLE-->.*|${{ steps.news.outputs.title }}|" README.md
          sed -i "s|<!--NEWS_LINK-->.*|${{ steps.news.outputs.url }}|" README.md
          sed -i "s|<!--AI_LINE-->.*|${{ steps.ai.outputs.line }}|" README.md
          sed -i "s|<!--TREND_REPO-->.*|${{ steps.repo.outputs.repo }}|" README.md


      - name: Commit changes
        run: |
          git config --global user.name "DhruvTilva"
          git config --global user.email "tilvadhruv8@gmail.com"
          git add README.md
          git commit -m "update: AI news, pulse & trending repo" || echo "No changes"
          git push
